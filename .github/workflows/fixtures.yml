name: fixture-integrity
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -e '.[test]'
      - run: git fetch origin main collide-a collide-b
      - run: python -m pytest -q
      - run: python scripts/check_docs.py
      - run: python scripts/verify_fixtures.py
